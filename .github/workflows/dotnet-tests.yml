name: .NET Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VoltGuard.FieldLink.sln

      - name: Build
        run: dotnet build VoltGuard.FieldLink.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/VoltGuard.UnitTests/VoltGuard.UnitTests.csproj --configuration Release --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/VoltGuard.IntegrationTests/VoltGuard.IntegrationTests.csproj --configuration Release --no-build --verbosity normal
